{% extends 'base.html' %}

{% block body %}

  <body>
    <h1>Управление ценами</h1>
    <div class="to-create-button">
        <a href="/entry" class="navigate-button">К созданию заказа</a>
        <a href="/view-all-orders" class="navigate-button">К заказам</a>
    </div>

    <!-- Форма добавления новой позиции -->
    <div class="add-form">
        <h2>Добавить новую позицию</h2>
        <form action="/add-price-item" method="post">
            <label>Название масла:
                <input type="text" name="oil_name" required>
            </label>
            <label>Объем (мл):
                <input type="number" name="volume" required>
            </label>
            <label>Цена (руб):
                <input type="number" step="0.01" name="price" required>
            </label>
            <button type="submit">Добавить</button>
        </form>
    </div>

    <!-- Таблица прайс-листа -->
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Название масла</th>
          <th>Объем (мл)</th>
          <th>Цена (руб)</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody>
            {% for item in prices %}
                    <tr>
                        <td>{{ item[0] }}</td>
                        <td>{{ item[1] }}</td>
                        <td>{{ item[2] }}</td>
                        <td>
                            <form action="/update-price" method="post" style="display:inline;">
                                <input type="hidden" name="item_id" value="{{ item[0] }}">
                                <input type="number" step="0.01" name="price" value="{{ item[3] }}" style="width:80px;">
                                <button type="submit">💾</button>
                            </form>
                        </td>
                        <td>
                            <form action="/delete-price-item" method="post" style="display:inline;" onsubmit="return confirm('Удалить эту позицию?');">
                                <input type="hidden" name="item_id" value="{{ item[0] }}">
                                <button type="submit" style="color:red;">🗑️</button>
                            </form>
                        </td>
                    </tr>
            {% endfor %}
      </tbody>
    </table>
  </body>

<style>
    .add-form {
        background: #f5f5f5;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
    }
    .add-form label {
        display: inline-block;
        margin-right: 15px;
    }
    .add-form input {
        margin-left: 5px;
        padding: 5px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
    }
    th {
        background-color: #4CAF50;
        color: white;
    }
    tr:nth-child(even) {
        background-color: #f2f2f2;
    }
    button {
        cursor: pointer;
        padding: 5px 10px;
        border: none;
        border-radius: 4px;
        background-color: #4CAF50;
        color: white;
    }
    button:hover {
        background-color: #45a049;
    }
    .navigate-button {
        display: inline-block;
        padding: 10px 20px;
        margin-right: 10px;
        background-color: #008CBA;
        color: white;
        text-decoration: none;
        border-radius: 4px;
    }
    .navigate-button:hover {
        background-color: #007bb5;
    }
</style>

{% endblock %}
